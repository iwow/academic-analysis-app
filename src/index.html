<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>九科学情分析数据模板</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:#1a1a1a;background:#f5f6fa;padding:20px;line-height:1.6}
.container{max-width:1200px;margin:0 auto}
h1{font-size:22px;font-weight:600;margin-bottom:4px;color:#1a237e}
.subtitle{font-size:14px;color:#888;margin-bottom:16px}
.card{background:#fff;border-radius:12px;border:0.5px solid #e0e0e5;padding:20px 24px;margin-bottom:16px}
.card h2{font-size:16px;font-weight:600;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #eee;color:#1a237e}
.card h3{font-size:14px;font-weight:600;margin:10px 0 6px;color:#333}
.flex{display:flex;gap:12px;flex-wrap:wrap}
.stat{flex:1;min-width:120px;background:#f5f6fa;border-radius:8px;padding:12px;text-align:center}
.stat .num{font-size:28px;font-weight:600;color:#1a237e}
.stat .num.up{color:#2e7d32}
.stat .num.down{color:#c62828}
.stat .lbl{font-size:11px;color:#888;margin-top:2px}
.chart-wrap{position:relative;height:280px;margin:6px 0}
.chart-wrap-sm{position:relative;height:200px;margin:6px 0}
table{width:100%;border-collapse:collapse;font-size:12px;margin:6px 0}
th{background:#f5f6fa;padding:7px 6px;text-align:center;font-weight:600;font-size:11px;color:#555;border-bottom:1px solid #ddd;cursor:pointer;user-select:none;white-space:nowrap}
th:hover{background:#e8eaf6}
th .sort{opacity:0.3;margin-left:2px}
td{padding:6px;text-align:center;border-bottom:0.5px solid #eee;font-size:12px}
tr:hover td{background:#fafafa}
td.sbj{text-align:left;font-weight:500;color:#333}
td.editable{cursor:pointer;position:relative;min-width:32px}
td.editable:hover{background:#e3f2fd}
td.editable input{width:100%;border:1px solid #4361ee;border-radius:4px;padding:2px 4px;font-size:12px;text-align:center;outline:none;background:#fff}
.score-high{color:#2e7d32;font-weight:600}
.score-mid{color:#e65100;font-weight:500}
.score-low{color:#c62828;font-weight:500}
.badge{display:inline-block;padding:1px 6px;border-radius:8px;font-size:10px;margin:1px}
.badge-a{background:#e8f5e9;color:#2e7d32}
.badge-b{background:#e3f2fd;color:#1565c0}
.badge-c{background:#fff3e0;color:#e65100}
.badge-d{background:#ffebee;color:#c62828}
.filter-bar{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap;align-items:center}
.filter-bar select,.filter-bar input{padding:5px 8px;border:0.5px solid #d0d0d5;border-radius:6px;font-size:12px;background:#fff;outline:none}
.filter-bar input{flex:1;min-width:160px}
.btn{padding:6px 14px;border:0.5px solid #d0d0d5;border-radius:6px;font-size:12px;background:#fff;cursor:pointer;transition:all .15s}
.btn:hover{background:#f5f6fa;border-color:#4361ee}
.btn-primary{background:#1a237e;color:#fff;border-color:#1a237e}
.btn-primary:hover{background:#283593}
.btn-success{background:#2e7d32;color:#fff;border-color:#2e7d32}
.btn-success:hover{background:#388e3c}
.btn-warning{background:#e65100;color:#fff;border-color:#e65100}
.btn-warning:hover{background:#ef6c00}
.tabs{display:flex;gap:0;margin-bottom:12px;border-bottom:1px solid #ddd;flex-wrap:wrap}
.tab-btn{padding:8px 14px;font-size:12px;border:none;background:none;cursor:pointer;color:#888;border-bottom:2px solid transparent;font-weight:500;transition:all .15s}
.tab-btn.active{color:#1a237e;border-bottom-color:#1a237e}
.tab-btn:hover{color:#333}
.tab-content{display:none}
.tab-content.active{display:block}
.form-row{display:flex;gap:8px;margin:6px 0;flex-wrap:wrap;align-items:center}
.form-row label{font-size:12px;font-weight:500;min-width:60px}
.form-row input,.form-row select{padding:5px 8px;border:0.5px solid #d0d0d5;border-radius:6px;font-size:12px;outline:none}
textarea{width:100%;padding:8px;border:0.5px solid #d0d0d5;border-radius:8px;font-size:12px;font-family:monospace;outline:none;resize:vertical}
.sub-row{display:flex;flex-wrap:wrap;gap:4px;margin:8px 0}
.sub-tag{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:6px;font-size:11px;background:#f5f6fa;border:0.5px solid #e0e0e5}
.sub-tag .sc{font-weight:600;font-size:12px}
.progress{height:6px;background:#eee;border-radius:3px;overflow:hidden;margin:2px 0}
.progress .bar{height:100%;border-radius:3px;transition:width .3s}
.weak-item{display:flex;justify-content:space-between;padding:5px 0;font-size:12px;border-bottom:0.5px solid #f0f0f0}
.weak-item .pct{font-weight:600}
.pct-red{color:#c62828}
.pct-orange{color:#e65100}
.pct-green{color:#2e7d32}
@media(max-width:600px){
  .stat{min-width:80px}
  .filter-bar{flex-direction:column}
  td,th{font-size:10px;padding:4px}
}
#print-area{display:none}
@media print{
  body{background:#fff;padding:0}
  .no-print{display:none!important}
  #print-area{display:block}
  .card{break-inside:avoid;border:0.5px solid #ddd}
}
</style>
</head>
<body>
<div class="container">

<h1>九科学情分析数据模板</h1>
<p class="subtitle">Win / Mac 通用 · 浏览器打开即可使用 · 双击单元格编辑 · 自动图表</p>

<div class="tabs" id="tabBar">
  <button class="tab-btn active" data-tab="dashboard">总览</button>
  <button class="tab-btn" data-tab="data">数据表</button>
  <button class="tab-btn" data-tab="chart">图表分析</button>
  <button class="tab-btn" data-tab="import">导入/导出</button>
  <button class="tab-btn" data-tab="config">设置</button>
</div>

<!-- === TAB: DASHBOARD === -->
<div class="tab-content active" id="tab-dashboard">
<div class="card">
  <h2>综合指标</h2>
  <div class="flex" id="dashboardMetrics"></div>
</div>
<div class="flex">
  <div class="card" style="flex:2">
    <h2>各科雷达图</h2>
    <div class="chart-wrap" style="height:300px"><canvas id="chartRadar" aria-label="Radar chart"></canvas></div>
  </div>
  <div class="card" style="flex:1">
    <h2>薄弱知识点 Top 5</h2>
    <div id="weakList"></div>
  </div>
</div>
<div class="card">
  <h2>总分趋势</h2>
  <div class="chart-wrap" style="height:220px"><canvas id="chartTrend" aria-label="Trend chart"></canvas></div>
</div>
<div class="card">
  <h2>学习建议</h2>
  <div id="adviceList" style="font-size:13px;color:#555"></div>
</div>
</div>

<!-- === TAB: DATA === -->
<div class="tab-content" id="tab-data">
<div class="card">
  <h2>成绩数据表 <span style="font-size:11px;font-weight:400;color:#888">双击单元格可编辑</span></h2>
  <div class="filter-bar">
    <input type="text" id="searchExam" placeholder="搜索考试名称..." oninput="renderDataTable()">
    <select id="filterSubject" onchange="renderDataTable()">
      <option value="">全部科目</option>
    </select>
    <span style="font-size:11px;color:#888;margin-left:auto" id="dataCount"></span>
  </div>
  <div style="overflow-x:auto">
  <table id="dataTable" style="font-size:11px">
    <thead id="dataThead"></thead>
    <tbody id="dataTbody"></tbody>
  </table>
  </div>
</div>
<div class="card">
  <h2>快速编辑</h2>
  <div class="form-row">
    <label>考试</label>
    <input type="text" id="quickExam" placeholder="如: 高三一模" style="flex:1">
  </div>
  <div class="form-row">
    <label>日期</label>
    <input type="date" id="quickDate">
  </div>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin:8px 0;font-size:12px" id="quickScoreInputs"></div>
  <div class="form-row">
    <button class="btn btn-primary" onclick="addQuickExam()">添加考试</button>
    <button class="btn btn-success" onclick="populateDemo()">填充演示数据</button>
    <button class="btn" onclick="clearData()">清空数据</button>
  </div>
</div>
</div>

<!-- === TAB: CHARTS === -->
<div class="tab-content" id="tab-chart">
<div class="flex">
  <div class="card" style="flex:1">
    <h2>单科趋势追踪</h2>
    <div class="form-row"><label>科目</label><select id="singleSubject" onchange="renderSingleSubject()"></select></div>
    <div class="chart-wrap" style="height:250px"><canvas id="chartSingle" aria-label="Single subject trend"></canvas></div>
  </div>
  <div class="card" style="flex:1">
    <h2>各科贡献度</h2>
    <div class="chart-wrap" style="height:250px"><canvas id="chartStack" aria-label="Stacked bar chart"></canvas></div>
  </div>
</div>
<div class="card">
  <h2>成绩热力图 <span style="font-size:11px;font-weight:400;color:#888">考试 × 科目</span></h2>
  <div style="overflow-x:auto">
    <table id="heatTable" style="font-size:10px;min-width:600px"></table>
  </div>
</div>
</div>

<!-- === TAB: IMPORT === -->
<div class="tab-content" id="tab-import">
<div class="card">
  <h2>导入 CSV</h2>
  <p style="font-size:12px;color:#888;margin-bottom:6px">格式: 考试名称, 日期, 科目, 分数, 满分 (每行一条记录)</p>
  <p style="font-size:11px;color:#aaa;margin-bottom:8px">示例: 高三一模,2026-01-15,数学,135,150</p>
  <textarea id="csvInput" rows="8" placeholder="粘贴 CSV 数据..."></textarea>
  <div class="form-row">
    <button class="btn btn-primary" onclick="importCSV()">导入</button>
    <button class="btn" onclick="exportCSV()">导出 CSV</button>
    <span id="importMsg" style="font-size:12px;color:#888"></span>
  </div>
</div>
</div>

<!-- === TAB: CONFIG === -->
<div class="tab-content" id="tab-config">
<div class="card">
  <h2>学生与设置</h2>
  <div class="form-row"><label>学生姓名</label><input type="text" id="studentName" value="张三" onchange="saveConfig()"></div>
  <div class="form-row"><label>年级</label><select id="studentGrade" onchange="saveConfig()"><option>高一</option><option>高二</option><option selected>高三</option></select></div>
  <div class="form-row"><label>选科</label><select id="studentTrack" onchange="saveConfig();updateSubjects()">
    <option value="理科">理科</option>
    <option value="文科">文科</option>
    <option value="新高考物化生" selected>新高考物化生</option>
    <option value="新高考物化地">新高考物化地</option>
    <option value="新高考物生地">新高考物生地</option>
    <option value="新高考历政地">新高考历政地</option>
    <option value="新高考历化生">新高考历化生</option>
  </select></div>
  <div class="form-row"><label>外语语种</label><select id="foreignLang" onchange="saveConfig()">
    <option>英语</option><option>日语</option><option>俄语</option><option>法语</option><option>德语</option><option>西班牙语</option><option>韩语</option>
  </select></div>
  <div class="form-row"><label>满分</label><input type="number" id="fullScore" value="100" min="50" max="150" onchange="saveConfig()" style="width:70px"></div>
</div>
<div class="card">
  <h2>数据管理</h2>
  <div class="form-row">
    <span style="font-size:12px" id="dataStats"></span>
  </div>
  <div class="form-row">
    <button class="btn btn-primary" onclick="saveToLocal()">保存到本地</button>
    <button class="btn btn-warning" onclick="loadFromLocal()">从本地恢复</button>
    <button class="btn btn-success no-print" onclick="window.print()">打印报告</button>
  </div>
</div>
</div>

<div class="card no-print" style="text-align:center;color:#888;font-size:11px">
  <p>Win / Mac 通用 · 数据自动保存在浏览器本地 · 双击表格修改 · 支持打印导出</p>
</div>

</div>

<script>
// ===== CONSTANTS =====
const ALL_SUBJECTS = [
  {id:'chinese',label:'语文'},{id:'math',label:'数学'},{id:'foreignLang',label:'外语'},
  {id:'physics',label:'物理'},{id:'chemistry',label:'化学'},{id:'biology',label:'生物'},
  {id:'history',label:'历史'},{id:'geography',label:'地理'},{id:'politics',label:'政治'}
];
const TRACK_SUBJECTS = {
  '理科':['chinese','math','foreignLang','physics','chemistry','biology'],
  '文科':['chinese','math','foreignLang','history','geography','politics'],
  '新高考物化生':['chinese','math','foreignLang','physics','chemistry','biology'],
  '新高考物化地':['chinese','math','foreignLang','physics','chemistry','geography'],
  '新高考物生地':['chinese','math','foreignLang','physics','biology','geography'],
  '新高考历政地':['chinese','math','foreignLang','history','geography','politics'],
  '新高考历化生':['chinese','math','foreignLang','history','chemistry','biology']
};
const SUBJ_NAMES = {chinese:'语文',math:'数学',foreignLang:'外语',physics:'物理',chemistry:'化学',biology:'生物',history:'历史',geography:'地理',politics:'政治'};
const SUBJ_COLORS = {chinese:'#e53935',math:'#1a73e8',foreignLang:'#43a047',physics:'#fb8c00',chemistry:'#8e24aa',biology:'#00acc1',history:'#6d4c41',geography:'#2e7d32',politics:'#c62828'};

// ===== STATE =====
let state = {
  student: { name:'张三', grade:'高三', track:'新高考物化生', foreignLang:'英语' },
  fullScore: 100,
  exams: [],
  scores: [] // {examId, subject, score}
};
let activeSubjects = [];
let editCell = null;
let charts = {};

// ===== INIT =====
function init(){
  loadFromLocal();
  buildSubjectFilter();
  buildQuickInputs();
  buildSingleSubjectSelect();
  updateSubjects();
  renderDashboard();
  renderDataTable();
  renderCharts();
  renderHeatTable();
  renderSingleSubject();
}

// ===== SUBJECT MANAGEMENT =====
function updateSubjects(){
  const track = state.student.track || '新高考物化生';
  activeSubjects = TRACK_SUBJECTS[track] || TRACK_SUBJECTS['新高考物化生'];
  buildQuickInputs();
  buildSubjectFilter();
  buildSingleSubjectSelect();
  renderAll();
}

function getActiveSubjects(){ return activeSubjects.map(id => ALL_SUBJECTS.find(s=>s.id===id)).filter(Boolean); }

// ===== DATA MANAGEMENT =====
function getExams(){ return [...state.exams].sort((a,b)=>new Date(a.date)-new Date(b.date)); }

function getScore(examId, subject){
  const s = state.scores.find(s=>s.examId===examId&&s.subject===subject);
  return s ? s.score : null;
}

function setScore(examId, subject, score){
  const idx = state.scores.findIndex(s=>s.examId===examId&&s.subject===subject);
  if(idx>=0){
    if(score===null||score==='') state.scores.splice(idx,1);
    else state.scores[idx].score = parseFloat(score);
  } else if(score!==null&&score!==''){
    state.scores.push({examId,subject,score:parseFloat(score)});
  }
  saveToLocal();
}

function addExam(name, date){
  const id = state.exams.length ? Math.max(...state.exams.map(e=>e.id)) + 1 : 1;
  state.exams.push({id,name,date});
  saveToLocal();
  return id;
}

function getTotal(examId){
  let t = 0;
  activeSubjects.forEach(s => { const v=getScore(examId,s); if(v !== null) t+=v; });
  return t;
}

function getFullTotal(){ return activeSubjects.length * state.fullScore; }

// ===== DEMO DATA =====
function populateDemo(){
  state.exams = [];
  state.scores = [];
  const exams = [
    {name:'高三上月考1',date:'2025-09-15'},{name:'高三上期中',date:'2025-10-30'},
    {name:'高三上月考2',date:'2025-11-20'},{name:'高三上期末',date:'2026-01-15'},
    {name:'高三下月考',date:'2026-03-10'},{name:'二模',date:'2026-04-20'},
    {name:'三模',date:'2026-05-15'}
  ];
  const baseScores = {
    chinese:[105,108,110,112,115,118,120],
    math:[110,115,118,120,125,130,135],
    foreignLang:[115,118,120,122,125,128,130],
    physics:[85,88,90,92,95,96,98],
    chemistry:[80,82,85,88,90,92,94],
    biology:[75,78,80,82,85,87,90],
    history:[70,72,73,75,76,78,80],
    geography:[72,74,75,77,78,80,82],
    politics:[68,70,72,74,76,78,80]
  };
  const fs = state.fullScore || 100;
  exams.forEach((e,ei) => {
    const id = state.exams.length + 1;
    state.exams.push({id, name:e.name, date:e.date});
    ALL_SUBJECTS.forEach(s => {
      const base = (baseScores[s.id] && baseScores[s.id][ei]) ? baseScores[s.id][ei] : 75;
      const variance = Math.round(Math.random()*10-5);
      state.scores.push({examId:id, subject:s.id, score:base+variance});
    });
  });
  saveToLocal();
  renderAll();
  document.getElementById('importMsg').textContent = '演示数据已加载 (7次考试×9科)';
}

function clearData(){
  if(!confirm('确定清空所有数据？')) return;
  state.exams = [];
  state.scores = [];
  saveToLocal();
  renderAll();
}

// ===== PERSISTENCE =====
function saveToLocal(){
  try{
    const data = {student:state.student, fullScore:state.fullScore, exams:state.exams, scores:state.scores};
    localStorage.setItem('academicData', JSON.stringify(data));
    document.getElementById('dataStats').textContent = state.exams.length + ' 次考试 · ' + state.scores.length + ' 条成绩 · ' + (state.exams.length*activeSubjects.length > 0 ? Math.round(state.scores.length/(state.exams.length*activeSubjects.length)*100)+'% 完整度' : '');
  } catch(e){}
}

function loadFromLocal(){
  try{
    const raw = localStorage.getItem('academicData');
    if(raw){
      const data = JSON.parse(raw);
      state.student = data.student || state.student;
      state.fullScore = data.fullScore || 100;
      state.exams = data.exams || [];
      state.scores = data.scores || [];
    }
    document.getElementById('studentName').value = state.student.name;
    document.getElementById('studentGrade').value = state.student.grade;
    document.getElementById('studentTrack').value = state.student.track;
    document.getElementById('foreignLang').value = state.student.foreignLang;
    document.getElementById('fullScore').value = state.fullScore;
  } catch(e){}
}

function saveConfig(){
  state.student.name = document.getElementById('studentName').value;
  state.student.grade = document.getElementById('studentGrade').value;
  state.student.track = document.getElementById('studentTrack').value;
  state.student.foreignLang = document.getElementById('foreignLang').value;
  state.fullScore = parseInt(document.getElementById('fullScore').value) || 100;
  updateSubjects();
  saveToLocal();
}

// ===== BUILD UI =====
function buildSubjectFilter(){
  const sel = document.getElementById('filterSubject');
  sel.innerHTML = '<option value="">全部科目</option>';
  getActiveSubjects().forEach(s => { sel.innerHTML += '<option value="'+s.id+'">'+s.label+'</option>'; });
}

function buildQuickInputs(){
  const container = document.getElementById('quickScoreInputs');
  container.innerHTML = '';
  getActiveSubjects().forEach(s => {
    container.innerHTML += '<div style="display:flex;flex-direction:column;gap:2px;align-items:center"><span style="font-size:10px;color:#888">'+s.label+'</span><input type="number" class="qi-'+s.id+'" placeholder="'+state.fullScore+'" style="width:100%;padding:4px;border:0.5px solid #ddd;border-radius:4px;text-align:center;font-size:12px"></div>';
  });
}

function buildSingleSubjectSelect(){
  const sel = document.getElementById('singleSubject');
  sel.innerHTML = '';
  getActiveSubjects().forEach(s => { sel.innerHTML += '<option value="'+s.id+'">'+s.label+'</option>'; });
  if(sel.options.length) sel.selectedIndex = 0;
}

// ===== RENDER: DASHBOARD =====
function renderDashboard(){
  const exams = getExams();
  const metrics = document.getElementById('dashboardMetrics');

  if(!exams.length){
    metrics.innerHTML = '<div class="card" style="flex:1;text-align:center;padding:20px"><p style="color:#888;font-size:13px">暂无数据 · 前往「数据表」或「导入」标签页添加</p></div>';
    document.getElementById('weakList').innerHTML = '<p class="text-muted" style="font-size:12px;color:#888">加载数据后自动分析</p>';
    document.getElementById('adviceList').innerHTML = '<p class="text-muted" style="font-size:12px;color:#888">加载数据后自动生成</p>';
    return;
  }

  const last = exams[exams.length-1];
  const lastTotal = getTotal(last.id);
  const prevTotal = exams.length>1 ? getTotal(exams[exams.length-2].id) : null;
  const ft = getFullTotal();
  const totals = exams.map(e => getTotal(e.id));
  const avg = Math.round(totals.reduce((a,b)=>a+b,0)/totals.length);
  const min = Math.min(...totals);
  const max = Math.max(...totals);

  metrics.innerHTML =
    '<div class="stat"><div class="num'+(prevTotal&&lastTotal>prevTotal?' up':' down')+'">'+lastTotal+'/'+ft+'</div><div class="lbl">最新总分 ('+last.name+')</div></div>'+
    '<div class="stat"><div class="num">'+avg+'</div><div class="lbl">平均总分 ('+exams.length+'次)</div></div>'+
    '<div class="stat"><div class="num">'+max+'</div><div class="lbl">最高总分</div></div>'+
    '<div class="stat"><div class="num'+(prevTotal&&lastTotal>prevTotal?' up':' down')+'">'+(prevTotal?(lastTotal-prevTotal>0?'+'+Math.round(lastTotal-prevTotal):Math.round(lastTotal-prevTotal)):'—')+'</div><div class="lbl">较上次变化</div></div>';

  // Weak areas
  const kpScores = {};
  activeSubjects.forEach(sid => { kpScores[sid] = []; });
  exams.forEach(e => {
    activeSubjects.forEach(sid => {
      const v = getScore(e.id, sid);
      if(v) kpScores[sid].push(v/state.fullScore);
    });
  });
  const avgRates = activeSubjects.map(sid => {
    const vals = kpScores[sid];
    const avg = vals.length ? Math.round(vals.reduce((a,b)=>a+b,0)/vals.length*100) : 0;
    return {sid, label: SUBJ_NAMES[sid], rate: avg};
  }).sort((a,b)=>a.rate-b.rate);

  let weakHtml = '';
  avgRates.slice(0,5).forEach((r,i) => {
    const pctClass = r.rate<50?'pct-red':r.rate<65?'pct-orange':'pct-green';
    weakHtml += '<div class="weak-item"><span>'+(i+1)+'. '+r.label+'</span><span class="pct '+pctClass+'">'+r.rate+'%</span><div class="progress" style="flex:1;margin:auto 8px"><div class="bar" style="width:'+r.rate+'%;background:'+(r.rate<50?'#c62828':r.rate<65?'#e65100':'#2e7d32')+'"></div></div></div>';
  });
  document.getElementById('weakList').innerHTML = weakHtml || '<p style="font-size:12px;color:#888">暂无数据</p>';

  // Advice
  const weak = avgRates[0];
  const strong = avgRates[avgRates.length-1];
  const trend = exams.length>=3 && totals[totals.length-1] > totals[0] ? '上升' : (totals[totals.length-1] < totals[0] ? '下降' : '稳定');
  let adviceHtml = '<p style="margin-bottom:6px">📊 整体趋势: <strong>'+trend+'</strong>，'+
    '最近一次 '+exams[exams.length-1].name+' 总分 '+lastTotal+'/'+ft+'。</p>'+
    '<p style="margin-bottom:6px">💪 优势学科: <strong>'+strong.label+'</strong> (平均'+strong.rate+'%)。</p>'+
    '<p style="margin-bottom:6px">🎯 薄弱学科: <strong>'+weak.label+'</strong> (平均'+weak.rate+'%)，建议优先投入时间。</p>';
  if(weak.rate < 60){
    adviceHtml += '<p style="margin-bottom:6px">📝 针对 <strong>'+weak.label+'</strong>：回归课本梳理知识框架，每天30分钟专项练习，重点突破基础题和中档题。</p>';
  }
  if(state.student.foreignLang && state.student.foreignLang !== '英语'){
    adviceHtml += '<p>🌐 外语科目为 <strong>'+state.student.foreignLang+'</strong>，注意小语种专项训练资源的积累。</p>';
  }
  document.getElementById('adviceList').innerHTML = adviceHtml;
}

// ===== RENDER: DATA TABLE =====
function renderDataTable(){
  const exams = getExams();
  const kw = document.getElementById('searchExam').value.toLowerCase();
  const filterSubj = document.getElementById('filterSubject').value;
  const filtered = kw ? exams.filter(e => e.name.toLowerCase().includes(kw)) : exams;

  // Build header
  let html = '<tr><th onclick="sortDataTable(0)" data-col="0">考试 <span class="sort">↓↑</span></th><th onclick="sortDataTable(1)" data-col="1">日期 <span class="sort">↓↑</span></th>';
  const subs = getActiveSubjects();
  subs.forEach(s => { html += '<th onclick="sortDataTable(\''+s.id+'\')" data-col="'+s.id+'" style="color:'+SUBJ_COLORS[s.id]+'">'+s.label+' <span class="sort">↓↑</span></th>'; });
  html += '<th onclick="sortDataTable(-1)" data-col="total" style="color:#1a237e">总分 <span class="sort">↓↑</span></th>';
  html += '<th style="width:24px;color:#c62828">×</th></tr>';
  document.getElementById('dataThead').innerHTML = html;

  // Build body — renderDataTable version
  let bodyHtml = '';
  filtered.forEach(e => {
    bodyHtml += '<tr><td class="sbj">'+e.name+'</td><td style="color:#888;font-size:10px">'+e.date+'</td>';
    subs.forEach(s => {
      const v = getScore(e.id, s.id);
      const cls = v===null?'':(v/state.fullScore>=0.85?'score-high':v/state.fullScore>=0.6?'score-mid':'score-low');
      bodyHtml += '<td class="editable" onclick="editTableScore(this,'+e.id+',\''+s.id+'\')" data-eid="'+e.id+'" data-subj="'+s.id+'"><span class="'+cls+'">'+(v!==null?v:'—')+'</span></td>';
    });

    const totCls = tot/getFullTotal()>=0.8?'score-high':tot/getFullTotal()>=0.6?'score-mid':'score-low';
    bodyHtml += '<td><strong class="'+totCls+'">'+tot+'</strong></td>';

function editTableScore(td, examId, subject){
  if(editCell) { editCell.innerHTML = editCell.dataset.origVal || '—'; editCell=null; }
  const orig = getScore(examId, subject);
  td.dataset.origVal = td.querySelector('span') ? td.querySelector('span').textContent : '—';
  td.innerHTML = '<input type="number" value="'+(orig!==null?orig:'')+'" min="0" max="'+state.fullScore+'" step="1" autofocus onblur="saveEdit(this,'+examId+',\''+subject+'\','+orig+')" onkeydown="if(event.key===\'Enter\')this.blur();if(event.key===\'Escape\'){this.parentElement.innerHTML=this.parentElement.dataset.origVal||\'—\';editCell=null}">';
  editCell = td;
  td.querySelector('input').focus();
  td.querySelector('input').select();
}

function saveEdit(input, examId, subject, orig){
  const val = input.value.trim();
  const td = input.parentElement;
  if(val===''||val===null){
    setScore(examId, subject, null);
  } else {
    const num = parseFloat(val);
    if(!isNaN(num) && num>=0 && num<= (state.fullScore*1.5)){
      setScore(examId, subject, num);
    }
  }
  editCell = null;
  renderAll();
}

// Sort data table
let dataSortCol = null;
let dataSortDir = 1;
function sortDataTable(col){
  // Save any in-progress edit first
  if(editCell){
    const inp = editCell.querySelector('input');
    if(inp) { inp.blur(); return; } // blur triggers saveEdit, re-sort after
    editCell = null;
  }
  if(dataSortCol===col){ dataSortDir*=-1; } else { dataSortCol=col; dataSortDir=1; }
  document.querySelectorAll('#dataThead th').forEach(th => th.classList.remove('sorted'));
  const ths = document.querySelectorAll('#dataThead th');
  for(let i=0;i<ths.length;i++){ if(ths[i].dataset.col==String(col)){ ths[i].classList.add('sorted'); break; } }
  // Sort the exam list
  const exams = getExams();
  exams.sort((a,b) => {
    let va,vb;
    if(col==='total'||col===-1){ va=getTotal(a.id); vb=getTotal(b.id); }
    else if(col===0){ va=a.name; vb=b.name; }
    else if(col===1){ va=a.date; vb=b.date; }
    else { va=getScore(a.id,String(col))||0; vb=getScore(b.id,String(col))||0; }
    if(typeof va==='string') return va.localeCompare(vb,'zh')*dataSortDir;
    return (va-vb)*dataSortDir;
  });
  // Re-render
  const kw = document.getElementById('searchExam').value.toLowerCase();
  const filtered = kw ? exams.filter(e => e.name.toLowerCase().includes(kw)) : exams;
  let bodyHtml = '';
  const subs = getActiveSubjects();
  filtered.forEach(e => {
    bodyHtml += '<tr><td class="sbj">'+e.name+'</td><td style="color:#888;font-size:10px">'+e.date+'</td>';
    subs.forEach(s => {
      const v = getScore(e.id, s.id);
      const cls = v===null?'':(v/state.fullScore>=0.85?'score-high':v/state.fullScore>=0.6?'score-mid':'score-low');
      bodyHtml += '<td class="editable" onclick="editTableScore(this,'+e.id+',\''+s.id+'\')" data-eid="'+e.id+'" data-subj="'+s.id+'"><span class="'+cls+'">'+(v!==null?v:'—')+'</span></td>';
    });
    const tot = getTotal(e.id);
    const totCls = tot/getFullTotal()>=0.8?'score-high':tot/getFullTotal()>=0.6?'score-mid':'score-low';
    bodyHtml += '<td><strong class="'+totCls+'">'+tot+'</strong></td>';
    bodyHtml += '<td><button class="btn" style="padding:2px 6px;font-size:10px;color:#c62828" onclick="if(confirm(\'删除 '+e.name+' ？\'))deleteExam('+e.id+')">×</button></td></tr>';
  });
  document.getElementById('dataTbody').innerHTML = bodyHtml;
}

// ===== DELETE EXAM =====
function deleteExam(examId){
  state.exams = state.exams.filter(e => e.id !== examId);
  state.scores = state.scores.filter(s => s.examId !== examId);
  saveToLocal();
  renderAll();
  document.getElementById('importMsg').textContent = '已删除考试';
}

// ===== QUICK ADD =====
function addQuickExam(){
  const name = document.getElementById('quickExam').value.trim();
  const date = document.getElementById('quickDate').value;
  if(!name||!date){ alert('请输入考试名称和日期'); return; }
  const eid = addExam(name, date);
  getActiveSubjects().forEach(s => {
    const inp = document.querySelector('.qi-'+s.id);
    if(inp && inp.value.trim()){
      const v = parseFloat(inp.value);
      if(!isNaN(v)) setScore(eid, s.id, v);
      inp.value = '';
    }
  });
  document.getElementById('quickExam').value = '';
  document.getElementById('quickDate').value = '';
  renderAll();
  document.getElementById('importMsg').textContent = '已添加「'+name+'」';
}

// ===== RENDER: CHARTS =====
function renderCharts(){
  renderRadarChart();
  renderTrendChart();
  renderStackedChart();
}

function renderRadarChart(){
  const exams = getExams();
  if(!exams.length) return;
  const last = exams[exams.length-1];
  const subs = getActiveSubjects();
  const data = subs.map(s => {
    const v = getScore(last.id, s.id);
    return v ? Math.round(v/state.fullScore*100) : 0;
  });
  if(charts.radar) charts.radar.destroy();
  charts.radar = new Chart(document.getElementById('chartRadar'), {
    type: 'radar',
    data: {
      labels: subs.map(s => s.label),
      datasets: [{
        label: '得分率 (%)',
        data: data,
        backgroundColor: 'rgba(26,35,126,0.08)',
        borderColor: '#1a237e',
        pointBackgroundColor: subs.map(s => SUBJ_COLORS[s.id]),
        pointBorderColor: '#fff',
        pointBorderWidth: 1,
        borderWidth: 1.5,
        pointRadius: 4
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display:false }, tooltip: { callbacks: { label: ctx => ctx.parsed.r + '%' } } },
      scales: { r: { beginAtZero: true, max: 100, ticks: { stepSize: 20, display:false }, grid: { color:'rgba(0,0,0,0.06)' }, angleLines: { color:'rgba(0,0,0,0.06)' }, pointLabels: { font: { size:10 } } } }
    }
  });
}

function renderHeatTable(){
  const exams = getExams();
  if(!exams.length){ document.getElementById('heatTable').innerHTML='<tr><td style="color:#888;padding:20px;text-align:center">暂无数据</td></tr>'; return; }
  const subs = getActiveSubjects();
  let html = '<tr><th style="min-width:70px">考试</th>';
  subs.forEach(s => { html += '<th style="color:'+SUBJ_COLORS[s.id]+'">'+s.label+'</th>'; });
  html += '</tr>';
  exams.forEach(e => {
    html += '<tr><td style="font-size:10px;text-align:left;white-space:nowrap">'+e.name+'</td>';
    subs.forEach(s => {
      const v = getScore(e.id, s.id);
      const pct = v ? v/state.fullScore : 0;
      const intensity = Math.round(pct*200);
      const r = intensity>170?Math.round(200-intensity):40;
      const g = intensity>170?40:Math.round(intensity);
      const bg = v!==null ? 'rgb('+r+','+g+',80)' : '#f5f6fa';
      html += '<td style="background:'+bg+';color:'+(pct>.6?'#fff':'#666')+';font-weight:'+(pct>.6?'600':'400')+'">'+(v!==null?v:'—')+'</td>';
    });
    html += '</tr>';
  });
  document.getElementById('heatTable').innerHTML = html;
}

// ===== IMPORT/EXPORT =====
function importCSV(){
  const text = document.getElementById('csvInput').value.trim();
  if(!text){ alert('请先粘贴 CSV 数据'); return; }
  const lines = text.split('\n').filter(l=>l.trim());
  let count = 0;
  const examMap = {};
  lines.forEach(line => {
    const parts = line.split(',').map(p=>p.trim());
    if(parts.length<4) return;
    const [ename, edate, esubj, escore] = parts;
    const efull = parts[4] ? parseFloat(parts[4]) : state.fullScore;
    if(!examMap[ename]){
      const id = state.exams.length ? Math.max(...state.exams.map(e=>e.id))+1 : 1;
      state.exams.push({id, name:ename, date:edate});
      examMap[ename] = id;
    }
    const eid = examMap[ename];
    // Find matching subject id
    const subjEntry = ALL_SUBJECTS.find(s => s.label===esubj || s.id===esubj);
    if(subjEntry && parseFloat(escore)){
      setScore(eid, subjEntry.id, parseFloat(escore));
      count++;
    }
  });
  saveToLocal();
  document.getElementById('importMsg').textContent = '导入完成: '+count+' 条记录';
  renderAll();
}

function exportCSV(){
  const exams = getExams();
  if(!exams.length){ alert('暂无数据可导出'); return; }
  let csv = '考试名称,日期,科目,分数,满分\n';
  exams.forEach(e => {
    activeSubjects.forEach(sid => {
      const v = getScore(e.id, sid);
      if(v!==null) csv += e.name+','+e.date+','+SUBJ_NAMES[sid]+','+v+','+state.fullScore+'\n';
    });
  });
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = state.student.name+'_学情数据_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
  document.getElementById('importMsg').textContent = '导出完成';
}
